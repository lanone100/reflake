<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回收料比例計算器 | Bộ Máy Tính Tỷ Lệ Tái Chế</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-light: #60ad5e;
            --secondary-color: #00796b;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --accent: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 語言切換按鈕 */
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
        }

        .lang-btn {
            padding: 5px 12px;
            border-radius: 15px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .lang-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin: 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
            background-color: #fafafa;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-light);
            background-color: #fff;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button.calc-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
            margin-top: 10px;
        }

        button.calc-btn:active {
            transform: scale(0.98);
        }

        /* 結果區塊 */
        .result-card {
            margin-top: 25px;
            background: #f8fff9;
            border: 1px solid #c8e6c9;
            border-radius: 15px;
            padding: 15px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }

        .result-item:last-child { border-bottom: none; }

        .result-value {
            font-weight: bold;
            color: var(--primary-color);
        }

        /* 數據表 */
        .data-info {
            margin-top: 25px;
            font-size: 12px;
        }

        .data-info h3 {
            font-size: 14px;
            border-left: 4px solid var(--accent);
            padding-left: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            background: #fff;
        }

        th, td {
            border: 1px solid #eee;
            padding: 6px;
            text-align: center;
        }

        th { background: #f4f4f4; }

        .footer-note {
            margin-top: 15px;
            color: var(--text-sub);
            font-size: 11px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('zh')">中文</button>
        <button class="lang-btn" onclick="setLang('vi')">Tiếng Việt</button>
    </div>

    <header>
        <h1 id="ui-title">回收料比例計算器</h1>
    </header>

    <form id="calcForm">
        <div class="input-row">
            <div class="form-group">
                <label id="ui-label-machine">機型選擇</label>
                <select id="machineType">
                    <option value="DH-901">DH-901</option>
                    <option value="DH-904">DH-904</option>
                </select>
            </div>
            <div class="form-group">
                <label id="ui-label-material">材料類型</label>
                <select id="materialType">
                    <option value="chip">CHIP (聚酯粒)</option>
                    <option value="flake">Flake (薄片)</option>
                </select>
            </div>
        </div>

        <div class="input-row">
            <div class="form-group">
                <label id="ui-label-virgin">原生重量 (kg)</label>
                <input type="number" id="virginMaterial" placeholder="0.00" step="0.01">
            </div>
            <div class="form-group">
                <label id="ui-label-recycled">回收重量 (kg)</label>
                <input type="number" id="recycledMaterial" placeholder="0.00" step="0.01">
            </div>
        </div>

        <div class="form-group">
            <label id="ui-label-loading">下料百分比 (%)</label>
            <select id="loadingPercentage" onchange="toggleCustom()">
                <option value="90">90%</option>
                <option value="85">85%</option>
                <option value="80">80%</option>
                <option value="75">75%</option>
                <option value="70">70%</option>
                <option value="65">65%</option>
                <option value="60">60%</option>
                <option value="custom">自定義 / Tùy chỉnh...</option>
            </select>
            <input type="number" id="customPercentage" style="display:none; margin-top:10px;" placeholder="1-100">
        </div>

        <button type="button" class="calc-btn" onclick="runCalculation()" id="ui-btn-calc">開始計算</button>
    </form>

    <div id="resultArea" class="result-card">
        <div class="result-item">
            <span id="ui-res-ratio">回收料比例</span>
            <span id="res-ratio" class="result-value">-</span>
        </div>
        <div class="result-item">
            <span id="ui-res-freq">所需頻率 (Hz)</span>
            <span id="res-freq" class="result-value">-</span>
        </div>
        <div class="result-item">
            <span id="ui-res-total">總重量</span>
            <span id="res-total" class="result-value">-</span>
        </div>
        <div class="result-item">
            <span id="ui-res-cap">估計產能</span>
            <span id="res-cap" class="result-value">-</span>
        </div>
    </div>

    <div class="data-info">
        <h3 id="ui-table-title">參考數據表 (Tham Khảo)</h3>
        <table>
            <thead>
                <tr>
                    <th colspan="2">DH-901</th>
                    <th colspan="2">DH-904</th>
                </tr>
                <tr>
                    <th>Hz</th>
                    <th>%</th>
                    <th>Hz</th>
                    <th>%</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
        <div class="footer-note" id="ui-footer-note">
            CHIP: 23.04 Hz/kg | Flake: 14.58 Hz/kg
        </div>
    </div>
</div>

<script>
    const i18n = {
        zh: {
            title: "回收料比例計算器",
            machine: "機型選擇",
            material: "材料類型",
            virgin: "原生重量 (kg)",
            recycled: "回收重量 (kg)",
            loading: "下料百分比 (%)",
            calc: "開始計算",
            resRatio: "回收料比例",
            resFreq: "所需頻率 (Hz)",
            resTotal: "總重量",
            resCap: "估計產能",
            tableTitle: "參考數據表",
            alert: "請填寫正確的數據"
        },
        vi: {
            title: "Máy Tính Tỷ Lệ Tái Chế",
            machine: "Chọn loại máy",
            material: "Loại nguyên liệu",
            virgin: "Trọng lượng nguyên sinh (kg)",
            recycled: "Trọng lượng tái chế (kg)",
            loading: "Tỷ lệ nạp liệu (%)",
            calc: "Bắt đầu tính toán",
            resRatio: "Tỷ lệ tái chế",
            resFreq: "Tần số yêu cầu (Hz)",
            resTotal: "Tổng trọng lượng",
            resCap: "Công suất ước tính",
            tableTitle: "Bảng dữ liệu tham khảo",
            alert: "Vui lòng nhập dữ liệu chính xác"
        }
    };

    let currentLang = 'zh';

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('ui-title').innerText = i18n[lang].title;
        document.getElementById('ui-label-machine').innerText = i18n[lang].machine;
        document.getElementById('ui-label-material').innerText = i18n[lang].material;
        document.getElementById('ui-label-virgin').innerText = i18n[lang].virgin;
        document.getElementById('ui-label-recycled').innerText = i18n[lang].recycled;
        document.getElementById('ui-label-loading').innerText = i18n[lang].loading;
        document.getElementById('ui-btn-calc').innerText = i18n[lang].calc;
        document.getElementById('ui-res-ratio').innerText = i18n[lang].resRatio;
        document.getElementById('ui-res-freq').innerText = i18n[lang].resFreq;
        document.getElementById('ui-res-total').innerText = i18n[lang].resTotal;
        document.getElementById('ui-res-cap').innerText = i18n[lang].resCap;
        document.getElementById('ui-table-title').innerText = i18n[lang].tableTitle;
    }

    function toggleCustom() {
        const sel = document.getElementById('loadingPercentage').value;
        document.getElementById('customPercentage').style.display = (sel === 'custom') ? 'block' : 'none';
    }

    // 初始化表格內容
    const tableData = [
        [40, "90%", 7, "10%"],
        [40, "85%", 11.15, "15%"],
        [40, "80%", 15.8, "20%"],
        [40, "75%", 21, "25%"],
        [40, "70%", 17.09, "30%"],
        [40, "65%", 34.03, "35%"],
        [40, "60%", 42.14, "40%"]
    ];

    const tbody = document.getElementById('tableBody');
    tableData.forEach(row => {
        let tr = `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td></tr>`;
        tbody.innerHTML += tr;
    });

    function runCalculation() {
        const v = parseFloat(document.getElementById('virginMaterial').value);
        const r = parseFloat(document.getElementById('recycledMaterial').value);
        let lp = document.getElementById('loadingPercentage').value;
        if(lp === 'custom') lp = document.getElementById('customPercentage').value;
        lp = parseFloat(lp);

        if(isNaN(v) || isNaN(r) || isNaN(lp)) {
            alert(i18n[currentLang].alert);
            return;
        }

        const total = v + r;
        const ratio = (r / total) * 100;
        const machine = document.getElementById('machineType').value;
        const matType = document.getElementById('materialType').value;
        const matRate = (matType === 'chip') ? 23.04 : 14.58;

        let freq = 0;
        if(machine === 'DH-901') {
            freq = 40;
        } else {
            // DH-904 插值邏輯
            const lookup = [
                {p: 10, f: 7}, {p: 15, f: 11.15}, {p: 20, f: 15.8}, 
                {p: 25, f: 21}, {p: 30, f: 17.09}, {p: 35, f: 34.03}, {p: 40, f: 42.14}
            ];
            
            if (lp <= 10) freq = 7;
            else if (lp >= 40) freq = 42.14;
            else {
                for(let i=0; i<lookup.length-1; i++) {
                    if(lp >= lookup[i].p && lp <= lookup[i+1].p) {
                        let l = lookup[i], u = lookup[i+1];
                        freq = l.f + (u.f - l.f) * (lp - l.p) / (u.p - l.p);
                        break;
                    }
                }
            }
        }

        const capacity = total * matRate;

        document.getElementById('res-ratio').innerText = ratio.toFixed(2) + ' %';
        document.getElementById('res-freq').innerText = freq.toFixed(2) + ' Hz';
        document.getElementById('res-total').innerText = total.toFixed(2) + ' kg';
        document.getElementById('res-cap').innerText = capacity.toFixed(2) + ' Hz/kg';
        document.getElementById('resultArea').style.display = 'block';
    }
</script>

</body>
</html>
