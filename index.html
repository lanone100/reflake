<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欣泛亞回收料比例計算器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            color: #333;
            background-color: #f5f5f5;
        }
        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 16px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f8ff;
            border-radius: 4px;
            display: none;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .result-label {
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        .info-section {
            margin-top: 20px;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .colored-row-0 { background-color: #ffeb99; }
        .colored-row-1 { background-color: #b3e6b3; }
        .colored-row-2 { background-color: #66cc99; }
        .colored-row-3 { background-color: #99ccff; }
        .colored-row-4 { background-color: #d9d9d9; }
        .colored-row-5 { background-color: #d9b38c; }
        .colored-row-6 { background-color: #cc99ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>欣泛亞回收料比例計算器</h1>
        
        <form id="calculatorForm">
            <label for="machineType">機型選擇：</label>
            <select id="machineType" required>
                <option value="">請選擇機型</option>
                <option value="DH-901">DH-901</option>
                <option value="DH-904">DH-904</option>
            </select>

            <label for="materialType">材料類型：</label>
            <select id="materialType" required>
                <option value="">請選擇材料類型</option>
                <option value="chip">CHIP（聚酯粒）</option>
                <option value="flake">Flake（薄片）</option>
            </select>
            
            <div id="recyclingSection">
                <label for="virginMaterial">原生材料重量 (kg)：</label>
                <input type="number" id="virginMaterial" min="0" step="0.01" required placeholder="請輸入原生材料重量">
                
                <label for="recycledMaterial">回收材料重量 (kg)：</label>
                <input type="number" id="recycledMaterial" min="0" step="0.01" required placeholder="請輸入回收材料重量">
            </div>

            <label for="loadingPercentage">下料百分比 (%)：</label>
            <select id="loadingPercentage" required>
                <option value="">請選擇下料百分比</option>
                <option value="90">90%</option>
                <option value="85">85%</option>
                <option value="80">80%</option>
                <option value="75">75%</option>
                <option value="70">70%</option>
                <option value="65">65%</option>
                <option value="60">60%</option>
                <option value="custom">自定義...</option>
            </select>

            <div id="customPercentageInput" style="display:none;">
                <label for="customPercentage">自定義下料百分比 (%)：</label>
                <input type="number" id="customPercentage" min="1" max="100" step="1" placeholder="輸入1-100之間的值">
            </div>

            <button type="button" onclick="calculate()">計算</button>
        </form>

        <div id="result" class="result">
            <div class="result-row">
                <span class="result-label">回收料比例：</span>
                <span id="recyclingRatio"></span>
            </div>
            <div class="result-row">
                <span class="result-label">所需頻率 (Hz)：</span>
                <span id="resultFrequency"></span>
            </div>
            <div class="result-row">
                <span class="result-label">總重量：</span>
                <span id="totalWeight"></span>
            </div>
            <div class="result-row">
                <span class="result-label">估計產能：</span>
                <span id="resultCapacity"></span>
            </div>
        </div>

        <div class="info-section">
            <h3>參考數據表</h3>
            <table id="referenceTable">
                <thead>
                    <tr>
                        <th colspan="2">DH-901</th>
                        <th colspan="2">DH-904</th>
                    </tr>
                    <tr>
                        <th>Hz</th>
                        <th>下料%</th>
                        <th>Hz</th>
                        <th>下料%</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="colored-row-0">
                        <td>40</td>
                        <td>90%</td>
                        <td>7</td>
                        <td>10%</td>
                    </tr>
                    <tr class="colored-row-1">
                        <td>40</td>
                        <td>85%</td>
                        <td>11.15</td>
                        <td>15%</td>
                    </tr>
                    <tr class="colored-row-2">
                        <td>40</td>
                        <td>80%</td>
                        <td>15.8</td>
                        <td>20%</td>
                    </tr>
                    <tr class="colored-row-3">
                        <td>40</td>
                        <td>75%</td>
                        <td>21</td>
                        <td>25%</td>
                    </tr>
                    <tr class="colored-row-4">
                        <td>40</td>
                        <td>70%</td>
                        <td>17.09</td>
                        <td>30%</td>
                    </tr>
                    <tr class="colored-row-5">
                        <td>40</td>
                        <td>65%</td>
                        <td>34.03</td>
                        <td>35%</td>
                    </tr>
                    <tr class="colored-row-6">
                        <td>40</td>
                        <td>60%</td>
                        <td>42.14</td>
                        <td>40%</td>
                    </tr>
                </tbody>
            </table>
            <p>
                <strong>材料參考值：</strong><br>
                CHIP（聚酯粒）: 23.04 1 Hz/kg<br>
                Flake（薄片）: 14.58 1 Hz/kg
            </p>
        </div>
    </div>

    <script>
        // 顯示自定義下料百分比輸入框
        document.getElementById('loadingPercentage').addEventListener('change', function() {
            var customInput = document.getElementById('customPercentageInput');
            if (this.value === 'custom') {
                customInput.style.display = 'block';
            } else {
                customInput.style.display = 'none';
            }
        });

        // 計算函數
        function calculate() {
            // 獲取表單數據
            const machineType = document.getElementById('machineType').value;
            const materialType = document.getElementById('materialType').value;
            const virginMaterial = parseFloat(document.getElementById('virginMaterial').value);
            const recycledMaterial = parseFloat(document.getElementById('recycledMaterial').value);
            let loadingPercentage = document.getElementById('loadingPercentage').value;
            
            // 檢查是否使用自定義百分比
            if (loadingPercentage === 'custom') {
                loadingPercentage = document.getElementById('customPercentage').value;
            }
            
            // 驗證輸入
            if (!machineType || !materialType || isNaN(virginMaterial) || isNaN(recycledMaterial) || !loadingPercentage) {
                alert('請填寫所有必要欄位');
                return;
            }
            
            // 轉換為數值
            loadingPercentage = parseFloat(loadingPercentage);
            
            // 計算總重量和回收料比例
            const totalWeight = virginMaterial + recycledMaterial;
            const recyclingRatio = (recycledMaterial / totalWeight) * 100;
            
            // 參考數據
            const materialRates = {
                'chip': 23.04,
                'flake': 14.58
            };
            
            // 根據機型和百分比查找對應的頻率
            let frequency;
            
            if (machineType === 'DH-901') {
                // DH-901 所有下料百分比都使用40Hz
                frequency = 40;
            } else if (machineType === 'DH-904') {
                // DH-904 根據下料百分比查表
                if (loadingPercentage == 10) frequency = 7;
                else if (loadingPercentage == 15) frequency = 11.15;
                else if (loadingPercentage == 20) frequency = 15.8;
                else if (loadingPercentage == 25) frequency = 21;
                else if (loadingPercentage == 30) frequency = 17.09;
                else if (loadingPercentage == 35) frequency = 34.03;
                else if (loadingPercentage == 40) frequency = 42.14;
                else {
                    // 自定義百分比：插值計算或提示
                    if (loadingPercentage < 10) {
                        frequency = 7 * (loadingPercentage / 10);
                    } else if (loadingPercentage > 40) {
                        frequency = 42.14 * (loadingPercentage / 40);
                    } else {
                        // 簡單線性插值
                        let lowerBound, upperBound, lowerFreq, upperFreq;
                        
                        if (loadingPercentage > 10 && loadingPercentage < 15) {
                            lowerBound = 10; upperBound = 15;
                            lowerFreq = 7; upperFreq = 11.15;
                        } else if (loadingPercentage > 15 && loadingPercentage < 20) {
                            lowerBound = 15; upperBound = 20;
                            lowerFreq = 11.15; upperFreq = 15.8;
                        } else if (loadingPercentage > 20 && loadingPercentage < 25) {
                            lowerBound = 20; upperBound = 25;
                            lowerFreq = 15.8; upperFreq = 21;
                        } else if (loadingPercentage > 25 && loadingPercentage < 30) {
                            lowerBound = 25; upperBound = 30;
                            lowerFreq = 21; upperFreq = 17.09;
                        } else if (loadingPercentage > 30 && loadingPercentage < 35) {
                            lowerBound = 30; upperBound = 35;
                            lowerFreq = 17.09; upperFreq = 34.03;
                        } else if (loadingPercentage > 35 && loadingPercentage < 40) {
                            lowerBound = 35; upperBound = 40;
                            lowerFreq = 34.03; upperFreq = 42.14;
                        }
                        
                        frequency = lowerFreq + (upperFreq - lowerFreq) * ((loadingPercentage - lowerBound) / (upperBound - lowerBound));
                    }
                }
            }
            
            // 計算所需的頻率和產能
            const materialRate = materialRates[materialType];
            const capacityRate = totalWeight * materialRate;
            
            // 顯示結果
            document.getElementById('recyclingRatio').textContent = recyclingRatio.toFixed(2) + '%';
            document.getElementById('resultFrequency').textContent = frequency.toFixed(2) + ' Hz';
            document.getElementById('totalWeight').textContent = totalWeight.toFixed(2) + ' kg';
            document.getElementById('resultCapacity').textContent = capacityRate.toFixed(2) + ' Hz/kg';
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
