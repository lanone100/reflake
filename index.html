<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧回收比例計算器</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --accent-gradient: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
            --result-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            --glass-white: rgba(255, 255, 255, 0.9);
            --text-dark: #1a1a1a;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            color: var(--text-dark);
        }

        .app-shell {
            width: 100%;
            max-width: 430px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        /* 獨立語言列 - 解決遮擋問題 */
        .lang-header {
            background: #0f2027;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-lang {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #ccc;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-lang.active {
            background: var(--accent-gradient);
            color: white;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 176, 155, 0.4);
        }

        header {
            background: var(--primary-gradient);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; font-weight: 700; }

        .form-container { padding: 25px 20px; }

        .card {
            background: #f9fbff;
            border: 1px solid #e1e8f0;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: #555; }

        select, input {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 14px;
            font-size: 16px;
            box-sizing: border-box;
            background: white;
            transition: all 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #00b09b;
            box-shadow: 0 0 10px rgba(0,176,155,0.1);
        }

        /* 計算按鈕 */
        .btn-calculate {
            width: 100%;
            padding: 18px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 18px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 176, 155, 0.2);
            transition: transform 0.2s;
        }

        .btn-calculate:active { transform: scale(0.97); }

        /* 結果顯示區塊 */
        .result-panel {
            margin-top: 30px;
            background: var(--result-gradient);
            border-radius: 24px;
            padding: 20px;
            display: none;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .res-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .res-item:last-child { border: none; }
        .res-label { font-weight: 500; color: #445; }
        .res-value { font-weight: 800; color: #007065; font-size: 1.2rem; }

        /* 數據表格 */
        .table-area { padding: 0 20px 30px; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; border-radius: 15px; overflow: hidden; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        th { background: #203a43; color: white; padding: 12px; }
        td { padding: 10px; text-align: center; border: 1px solid #f0f0f0; }
        .row-alt { background: #f8fcfb; }

        .formula-tag {
            display: inline-block;
            margin-top: 20px;
            padding: 10px;
            background: #fffbe6;
            border-left: 4px solid #ffe58f;
            color: #856404;
            font-size: 0.75rem;
            line-height: 1.6;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="lang-header">
        <button class="btn-lang active" id="l-zh" onclick="setLanguage('zh')">中文</button>
        <button class="btn-lang" id="l-vi" onclick="setLanguage('vi')">Tiếng Việt</button>
    </div>

    <header>
        <h1 id="ui-title">回收料比例計算器</h1>
    </header>

    <div class="form-container">
        <div class="card">
            <div class="input-row">
                <div>
                    <label id="ui-m">機型選擇</label>
                    <select id="machine">
                        <option value="DH-901">DH-901</option>
                        <option value="DH-904">DH-904</option>
                    </select>
                </div>
                <div>
                    <label id="ui-mat">材料類型</label>
                    <select id="material">
                        <option value="chip">CHIP</option>
                        <option value="flake">Flake</option>
                    </select>
                </div>
            </div>

            <label id="ui-v">原生材料重量 (kg)</label>
            <input type="number" id="vWeight" placeholder="0.00">

            <label id="ui-r">回收材料重量 (kg)</label>
            <input type="number" id="rWeight" placeholder="0.00">

            <label id="ui-p">下料百分比 (%)</label>
            <select id="lPercent" onchange="toggleCustom()">
                <option value="90">90%</option>
                <option value="85">85%</option>
                <option value="80">80%</option>
                <option value="75">75%</option>
                <option value="70">70%</option>
                <option value="65">65%</option>
                <option value="60">60%</option>
                <option value="custom">自定義 / Tùy chỉnh</option>
            </select>
            <input type="number" id="customP" style="display:none; margin-top:10px;" placeholder="1-100">
        </div>

        <button class="btn-calculate" onclick="doCalc()" id="ui-btn">開始計算 / TÍNH TOÁN</button>

        <div id="res-box" class="result-panel">
            <div class="res-item"><span id="ui-res1">回收料比例</span><span class="res-value" id="res-ratio">-</span></div>
            <div class="res-item"><span id="ui-res2">所需頻率</span><span class="res-value" id="res-hz">-</span></div>
            <div class="res-item"><span id="ui-res3">總重量</span><span class="res-value" id="res-total">-</span></div>
            <div class="res-item"><span id="ui-res4">產能參考</span><span class="res-value" id="res-cap">-</span></div>
        </div>
    </div>

    <div class="table-area">
        <table>
            <thead>
                <tr><th colspan="2">DH-901</th><th colspan="2">DH-904</th></tr>
                <tr><th>Hz</th><th>%</th><th>Hz</th><th>%</th></tr>
            </thead>
            <tbody id="tb-body"></tbody>
        </table>
        
        <div class="formula-tag">
            <strong id="ui-ref">計算公式參考：</strong><br>
            • 比例 = (回收 / 總重) × 100%<br>
            • 產能 = 總重 × 材料係數 (CHIP: 23.04 / Flake: 14.58)
        </div>
    </div>
</div>

<script>
    const i18n = {
        zh: {
            title: "回收料比例計算器", m: "機型選擇", mat: "材料類型", v: "原生材料重量 (kg)", r: "回收材料重量 (kg)",
            p: "下料百分比 (%)", btn: "開始計算", res1: "回收比例", res2: "所需頻率 (Hz)", res3: "總重量 (kg)",
            res4: "估計產能", ref: "計算公式參考：", err: "請輸入正確數據"
        },
        vi: {
            title: "Máy Tính Tỷ Lệ Tái Chế", m: "Loại máy", mat: "Loại vật liệu", v: "Trọng lượng NS (kg)", r: "Trọng lượng TC (kg)",
            p: "Tỷ lệ nạp (%)", btn: "TÍNH TOÁN", res1: "Tỷ lệ tái chế", res2: "Tần số (Hz)", res3: "Tổng trọng lượng",
            res4: "Công suất", ref: "Tham khảo công thức:", err: "Vui lòng nhập số hợp lệ"
        }
    };

    let currentLang = 'zh';

    function setLanguage(lang) {
        currentLang = lang;
        document.getElementById('l-zh').className = lang === 'zh' ? 'btn-lang active' : 'btn-lang';
        document.getElementById('l-vi').className = lang === 'vi' ? 'btn-lang active' : 'btn-lang';
        
        const d = i18n[lang];
        document.getElementById('ui-title').innerText = d.title;
        document.getElementById('ui-m').innerText = d.m;
        document.getElementById('ui-mat').innerText = d.mat;
        document.getElementById('ui-v').innerText = d.v;
        document.getElementById('ui-r').innerText = d.r;
        document.getElementById('ui-p').innerText = d.p;
        document.getElementById('ui-btn').innerText = d.btn;
        document.getElementById('ui-res1').innerText = d.res1;
        document.getElementById('ui-res2').innerText = d.res2;
        document.getElementById('ui-res3').innerText = d.res3;
        document.getElementById('ui-res4').innerText = d.res4;
        document.getElementById('ui-ref').innerText = d.ref;
    }

    function toggleCustom() {
        document.getElementById('customP').style.display = document.getElementById('lPercent').value === 'custom' ? 'block' : 'none';
    }

    function doCalc() {
        const v = parseFloat(document.getElementById('vWeight').value);
        const r = parseFloat(document.getElementById('rWeight').value);
        let lp = document.getElementById('lPercent').value;
        if(lp === 'custom') lp = document.getElementById('customP').value;
        lp = parseFloat(lp);

        if(isNaN(v) || isNaN(r) || isNaN(lp)) { alert(i18n[currentLang].err); return; }

        const total = v + r;
        const ratio = (r / total) * 100;
        const mach = document.getElementById('machine').value;
        const mat = document.getElementById('material').value;
        const factor = mat === 'chip' ? 23.04 : 14.58;

        let hz = 40;
        if(mach === 'DH-904') {
            const map = [{p:10,f:7},{p:15,f:11.15},{p:20,f:15.8},{p:25,f:21},{p:30,f:17.09},{p:35,f:34.03},{p:40,f:42.14}];
            if(lp <= 10) hz = 7;
            else if(lp >= 40) hz = 42.14;
            else {
                for(let i=0; i<map.length-1; i++){
                    if(lp >= map[i].p && lp <= map[i+1].p){
                        hz = map[i].f + (map[i+1].f - map[i].f) * (lp - map[i].p) / (map[i+1].p - map[i].p);
                        break;
                    }
                }
            }
        }

        document.getElementById('res-ratio').innerText = ratio.toFixed(2) + ' %';
        document.getElementById('res-hz').innerText = hz.toFixed(2) + ' Hz';
        document.getElementById('res-total').innerText = total.toFixed(2) + ' kg';
        document.getElementById('res-cap').innerText = (total * factor).toFixed(2);
        document.getElementById('res-box').style.display = 'block';
    }

    // 填充數據表格
    const rawData = [[40,90,7,10],[40,85,11.15,15],[40,80,15.8,20],[40,75,21,25],[40,70,17.09,30],[40,65,34.03,35],[40,60,42.14,40]];
    document.getElementById('tb-body').innerHTML = rawData.map((r, i) => `
        <tr class="${i % 2 === 0 ? '' : 'row-alt'}">
            <td>${r[0]}</td><td>${r[1]}%</td><td>${r[2]}</td><td>${r[3]}%</td>
        </tr>`).join('');

    setLanguage('zh');
</script>
</body>
</html>
